services:
  stt:
    build:
      context: ./stt-server
      dockerfile: Dockerfile
      args:
        - WHISPER_MODEL_REPO=${WHISPER_MODEL_REPO:-deepdml/faster-whisper-large-v3-turbo-ct2}
        - WHISPER_MODEL_NAME=${WHISPER_MODEL_NAME:-faster-whisper-large-v3-turbo}
        - HF_TOKEN=${HF_TOKEN:-}
    container_name: yedam-stt
    restart: unless-stopped
    environment:
      - OMP_NUM_THREADS=${WHISPER_OMP_NUM_THREADS:-4}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8_float16}
      - CUDA_MPS_PIPE_DIRECTORY=/tmp/nvidia-mps
      - CUDA_MPS_ACTIVE_THREAD_PERCENTAGE=${STT_MPS_THREAD_PCT:-30}
      - STT_EXTRA_FLUSH_MARKERS=${STT_EXTRA_FLUSH_MARKERS:-}
    volumes:
      - ${MPS_PIPE_DIR:-/tmp/nvidia-mps}:/tmp/nvidia-mps
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  llm:
    image: vllm/vllm-openai:latest
    container_name: yedam-llm
    restart: unless-stopped
    environment:
      - CUDA_MPS_PIPE_DIRECTORY=/tmp/nvidia-mps
      - CUDA_MPS_ACTIVE_THREAD_PERCENTAGE=${LLM_MPS_THREAD_PCT:-25}
    volumes:
      - ${MPS_PIPE_DIR:-/tmp/nvidia-mps}:/tmp/nvidia-mps
    command:
      - "--model"
      - "${LLM_MODEL:-Qwen/Qwen3-8B-AWQ}"
      - "--quantization"
      - "${LLM_QUANTIZATION:-awq_marlin}"
      - "--kv-cache-dtype"
      - "${LLM_KV_CACHE_DTYPE:-fp8}"
      - "--gpu-memory-utilization"
      - "${LLM_GPU_MEMORY_UTILIZATION:-0.20}"
      - "--max-model-len"
      - "${LLM_MAX_MODEL_LEN:-2048}"
      - "--max-num-seqs"
      - "${LLM_MAX_NUM_SEQS:-8}"
      - "--enable-prefix-caching"
      - "--enforce-eager"
      - "--attention-backend"
      - "${LLM_ATTENTION_BACKEND:-FLASH_ATTN}"
      - "--performance-mode"
      - "interactivity"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  tts:
    build:
      context: ./tts-server
      dockerfile: Dockerfile
      args:
        - HF_TOKEN=${HF_TOKEN:-}
    container_name: yedam-tts
    restart: unless-stopped
    environment:
      - MODEL_DIR=${TTS_MODEL_DIR:-/app/models/Qwen3-TTS-12Hz-1.7B-CustomVoice}
      - TOKENIZER_DIR=${TTS_TOKENIZER_DIR:-/app/models/Qwen3-TTS-Tokenizer-12Hz-48kHz}
      - TARGET_SAMPLE_RATE=${TARGET_SAMPLE_RATE:-48000}
      - SHARE_SPEECH_TOKENIZER=1
      - TTS_VRAM_BUDGET_MB=${TTS_VRAM_BUDGET_MB:-}
      - PORT=7860
      - REF_AUDIO_PATH_EN=${REF_AUDIO_PATH_EN:-/app/ref_audio/en.wav}
      - REF_TEXT_EN=${REF_TEXT_EN:-Hello my name is Ian and I'm testing the voice cloning system the weather is quite nice and I hope to go for a walk later this afternoon this recording will help the system learn how I speak}
      - REF_AUDIO_PATH_KO=${REF_AUDIO_PATH_KO:-}
      - REF_TEXT_KO=${REF_TEXT_KO:-}
      - X_VECTOR_ONLY=${X_VECTOR_ONLY:-0}
      - TORCHINDUCTOR_CACHE_DIR=/tmp/torchinductor
      - MAX_MODEL_LEN=${MAX_MODEL_LEN:-2048}
      - DECODE_COLLECT_MS=${DECODE_COLLECT_MS:-40}
      - TTS_TALKER_TEMPERATURE=${TTS_TALKER_TEMPERATURE:-0.7}
      - STREAMING_CONTEXT_SIZE=${STREAMING_CONTEXT_SIZE:-16}
      - TTS_PREDICTOR_TEMPERATURE=${TTS_PREDICTOR_TEMPERATURE:-0.6}
      - TTS_HIGHPASS_HZ=${TTS_HIGHPASS_HZ:-80}
      - TTS_TARGET_RMS=${TTS_TARGET_RMS:-0.08}
      - TTS_REPETITION_PENALTY=${TTS_REPETITION_PENALTY:-1.1}
      - TTS_REPETITION_PENALTY_WINDOW=${TTS_REPETITION_PENALTY_WINDOW:-100}
      - TTS_SUPPRESS_MASK=${TTS_SUPPRESS_MASK:-1}
      - TTS_EOS_MIN_STEPS=${TTS_EOS_MIN_STEPS:-0}
      - TTS_EOS_BOOST_MAX=${TTS_EOS_BOOST_MAX:-3.0}
      - TTS_EOS_BOOST_START_STEP=${TTS_EOS_BOOST_START_STEP:-35}
      - TTS_EOS_BOOST_MAX_STEP=${TTS_EOS_BOOST_MAX_STEP:-300}
      - TTS_EOS_LOOP_DETECT_WINDOW=${TTS_EOS_LOOP_DETECT_WINDOW:-12}
      - TTS_EOS_LOOP_THRESHOLD=${TTS_EOS_LOOP_THRESHOLD:-0.4}
      - TTS_EOS_LOOP_BOOST=${TTS_EOS_LOOP_BOOST:-5.0}
      - TTS_EOS_LOOP_FORCE_AFTER=${TTS_EOS_LOOP_FORCE_AFTER:-15}
      - CUDA_MPS_PIPE_DIRECTORY=/tmp/nvidia-mps
      - CUDA_MPS_ACTIVE_THREAD_PERCENTAGE=${TTS_MPS_THREAD_PCT:-45}

    shm_size: '4g'
    volumes:
      - ${MPS_PIPE_DIR:-/tmp/nvidia-mps}:/tmp/nvidia-mps
      - ${REF_AUDIO_DIR:-./tts-server/ref_audio}:/app/ref_audio:ro
      - ./tts-server/models/Qwen3-TTS-12Hz-1.7B-CustomVoice:/app/models/Qwen3-TTS-12Hz-1.7B-CustomVoice:ro
    ports:
      - "${TTS_PORT:-7860}:7860"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: yedam-orchestrator
    restart: unless-stopped
    environment:
      - ORCHESTRATOR_PORT=${ORCHESTRATOR_PORT:-8080}
      - STT_WS_URL=${STT_WS_URL:-ws://stt:9090}
      - LLM_API_URL=${LLM_API_URL:-http://llm:8000/v1}
      - TTS_API_URL=${TTS_API_URL:-http://tts:7860}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEFAULT_SOURCE_LANG=${DEFAULT_SOURCE_LANG:-ko}
      - DEFAULT_TARGET_LANG=${DEFAULT_TARGET_LANG:-en}
      - DEFAULT_PROCESSOR=${DEFAULT_PROCESSOR:-translation}
      - LLM_CONTEXT_WINDOW_SEGMENTS=${LLM_CONTEXT_WINDOW_SEGMENTS:-5}
      - STT_INITIAL_PROMPT_SEGMENTS=${STT_INITIAL_PROMPT_SEGMENTS:-3}
      - LLM_SYSTEM_PROMPT_PATH=${LLM_SYSTEM_PROMPT_PATH:-}
      - STT_INITIAL_PROMPT_VOCAB=${STT_INITIAL_PROMPT_VOCAB:-}
      - STT_INITIAL_PROMPT_VOCAB_PATH=${STT_INITIAL_PROMPT_VOCAB_PATH:-}
    ports:
      - "${ORCHESTRATOR_PORT:-8080}:8080"
    # No depends_on — start.sh handles startup ordering:
    # LLM → TTS+STT (parallel) → coordinator → orchestrator
