# docker-compose.tensorrt.yml
# Override file that replaces the STT service with TensorRT backend.
# Usage: docker compose -f docker-compose.yml -f docker-compose.tensorrt.yml up
#
# NOTE: First startup takes ~10-15 minutes to build TRT engines.
# Engines are cached in the trt_engines named volume for subsequent starts.
# To rebuild engines (e.g. after model change): docker volume rm yedam-sts_trt_engines

services:
  stt:
    build:
      context: ./stt-server
      dockerfile: Dockerfile.tensorrt
    container_name: yedam-stt-trt
    restart: unless-stopped
    environment:
      - OMP_NUM_THREADS=${WHISPER_OMP_NUM_THREADS:-4}
      - WHISPER_MODEL=${WHISPER_TRT_MODEL:-large-v3-turbo}
      - BEAM_SIZE=${STT_BEAM_SIZE:-1}
      - ENGINE_DIR=/app/engines
      - ASSETS_DIR=/app/assets
      - CUDA_MPS_PIPE_DIRECTORY=/tmp/nvidia-mps
      - CUDA_MPS_ACTIVE_THREAD_PERCENTAGE=${STT_MPS_THREAD_PCT:-30}
      - PMIX_MCA_gds_ds21_lock_on=0
      - OMPI_MCA_btl_vader_single_copy_mechanism=none
      - STT_KV_CACHE_FREE_GPU_FRACTION=${STT_KV_CACHE_FREE_GPU_FRACTION:-0.05}
      - STT_DEFER_KV_CACHE=1
    volumes:
      - trt_engines:/app/engines
      - ${MPS_PIPE_DIR:-/tmp/nvidia-mps}:/tmp/nvidia-mps
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: '16g'

volumes:
  trt_engines:
