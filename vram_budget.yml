# VRAM Budget Configuration
# ========================
# Two-phase allocation model:
#   Phase 1: All services load weights in parallel.
#   Phase 2: Coordinator measures actual free VRAM, distributes KV cache by priority.
#
# LLM fixed_mb is used to compute LLM_GPU_MEMORY_UTILIZATION before startup.
# TTS/STT fixed_mb are documentation only — the coordinator measures actual usage.
#
# Run: ./scripts/start.sh [--trt] [--dev]

gpu:
  reserved_mb: 400   # Headless server: fragmentation headroom (~300) + scratch (~100)
                      # Set to 800 for desktop with Xorg

services:
  llm:
    fixed_mb: 5500        # Qwen3-8B-AWQ weights (~5000) + CUDA context (~500)
                          # Used to compute LLM_GPU_MEMORY_UTILIZATION env var
    variable_priority: 1  # Low: short context, max 8 seqs — small KV cache needed
    min_variable_mb: 200
    # Output env: LLM_GPU_MEMORY_UTILIZATION

  stt:
    fixed_mb: 1800        # Whisper medium (komixv2) int8_float16 (~1300) + CUDA context (~500)
                          # Documentation only — coordinator measures actual
    variable_priority: 1
    min_variable_mb: 50
    # No output env needed — faster-whisper allocates what it needs

  stt_trt:
    fixed_mb: 2500        # Whisper medium TRT engines (~1800) + CUDA context (~500) + runtime (~200)
                          # Was 1500 for small; medium is ~3x more params
                          # Documentation only — coordinator measures actual
    variable_priority: 1
    min_variable_mb: 100
    # Output env: STT_KV_CACHE_FREE_GPU_FRACTION (via coordinator)

  tts:
    fixed_mb: 9200        # Qwen3-TTS-12Hz-1.7B (bf16):
                          #   Main: text embeddings + tokenizer + CUDA graphs (~1770)
                          #   Talker: 1.42B params * bf16 * 1.5x overhead (~5210)
                          #   Predictor: weights + 15 lm_heads + 15 codec_emb * 1.7x (~600)
                          #   CUDA contexts (3 TTS procs × ~200) (~600)
                          #   Misc fragmentation + activations (~1020)
                          # Documentation only — coordinator measures actual
    variable_priority: 3  # Highest: TTS is the bottleneck, talker KV cache determines concurrency
    min_variable_mb: 500
    # Output env: TTS_VRAM_BUDGET_MB (via coordinator)
